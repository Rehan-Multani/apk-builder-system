name: template_app
description: A new Flutter project for Web to APK conversion.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.0.0
  url_launcher: ^6.2.1
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  http: ^1.1.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_native_splash: ^2.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/
